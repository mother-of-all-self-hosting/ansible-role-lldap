---
- name: Ensure LLDAP paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ lldap_uid }}"
    group: "{{ lldap_gid }}"
  with_items:
    - "{{ lldap_base_path }}"
    - "{{ lldap_data_path }}"

- name: Ensure LLDAP support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ lldap_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ lldap_uid }}"
    group: "{{ lldap_gid }}"
  with_items:
    - env
    - labels
  register: lldap_support_files_result

- name: Run if self-building of LLDAP container image is not enabled
  when: "not lldap_container_image_self_build | bool"
  block:
    - name: Ensure LLDAP container image is pulled via community.docker.docker_image_pull
      when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
      community.docker.docker_image_pull:
        name: "{{ lldap_container_image }}"
        pull: always
      register: lldap_container_image_pull_result_ansible_module
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: lldap_container_image_pull_result_ansible_module is not failed

    - name: Ensure LLDAP container image is pulled via ansible.builtin.command
      when: devture_systemd_docker_base_container_image_pull_method == 'command'
      ansible.builtin.command:
        cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ lldap_container_image }}"
      register: lldap_container_image_pull_result_command
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: lldap_container_image_pull_result_command is not failed
      changed_when: "'Downloaded newer image' in lldap_container_image_pull_result_command.stdout"

- name: Run if self-building of LLDAP container image is enabled
  when: "lldap_container_image_self_build | bool"
  block:
    - name: Ensure LLDAP repository is present on self-build
      ansible.builtin.git:
        repo: "{{ lldap_container_image_self_build_repo }}"
        version: "{{ lldap_container_image_self_build_repo_version }}"
        dest: "{{ lldap_container_image_self_build_src_files_path }}"
        force: "yes"
      register: lldap_git_pull_results

    - name: Ensure LLDAP container image is built
      community.docker.docker_image_build:
        name: "{{ lldap_container_image_self_build_name }}"
        dockerfile: Dockerfile
        path: "{{ lldap_container_image_self_build_src_files_path }}"
        pull: true
        rebuild: "{{ 'always' if lldap_git_pull_results.changed | bool else 'never' }}"
      register: lldap_container_image_build_result

- name: Ensure LLDAP container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ lldap_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: lldap_network_creation_result

- name: Ensure LLDAP container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ lldap_container_network }}
  register: lldap_network_creation_result
  changed_when: lldap_network_creation_result.rc == 0
  failed_when: lldap_network_creation_result.rc != 0 and 'already exists' not in lldap_network_creation_result.stderr

- name: Ensure LLDAP systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/lldap.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ lldap_identifier }}.service"
    mode: "0644"
  register: lldap_systemd_service_result

- name: Determine whether LLDAP needs a restart
  ansible.builtin.set_fact:
    lldap_restart_necessary: >-
      {{
        lldap_support_files_result.changed | default(false)
        or lldap_systemd_service_result.changed | default(false)
        or lldap_container_image_pull_result_ansible_module.changed | default(false)
        or lldap_container_image_pull_result_command.changed | default(false)
        or lldap_container_image_build_result.changed | default(false)
      }}
